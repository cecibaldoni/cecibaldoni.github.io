project:
  type: website
  #output-dir: docs
  resources:
    - sitemap.xml

execute:
  freeze: auto

website:
  title: "Cecilia Baldoni"
  site-url: https://cecibaldoni.github.io/
  favicon: img/shrew.png
  navbar:
    left:
      - text: "About"
        href: content/about.qmd
      - text: "Projects"
        href: content/project.qmd
      - text: "Blog"
        href: blog/index.qmd
      - text: "Contact"
        href: content/contact.qmd

    right:
      - text: "{{< iconify fa6-brands:google-scholar >}}"
        href: https://scholar.google.com/citations?user=mxM_Py8AAAAJ&hl=en&oi=sra
      - text: "{{< iconify garden:bookmark-fill-12 >}}"
        href: https://substack.com/@cecibaldoni
      - text: "{{< iconify meteor-icons:bluesky >}}"
        href: https://bsky.app/profile/cecibaldoni.bsky.social
      - icon: instagram
        href: https://www.instagram.com/cecibaldoni/?hl=en
      - icon: github
        href: https://github.com/cecibaldoni/
      - icon: LinkedIn
        href: https://www.linkedin.com/in/cecilia-baldoni/

  page-footer: 
    right: "Built with [Quarto](https://quarto.org/)"
    left: |
      <div>&copy; Copyright 2026, Cecilia Baldoni</div>

      <div id="cookie-banner-placeholder"></div>
      
      <script>
        function loadGoogleAnalytics() {
          const gascript = document.createElement("script");
          gascript.async = true;
          gascript.src = "https://www.googletagmanager.com/gtag/js?id=G-DV6K7C0XDV";
          document.head.appendChild(gascript);
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-DV6K7C0XDV');
        }

        document.addEventListener("DOMContentLoaded", function () {
          if (localStorage.getItem("cookieAccepted") === "true") {
            loadGoogleAnalytics();
            return;
          }
          const bannerHTML = `
            <div id="cookie-banner">
              <p>
                This website uses cookies for analytics. By clicking "OK", you agree to its use.
                <button id="accept-cookies">OK</button>
                <a href="privacy.html" class="cookie-link">(learn more)</a>
              </p>
            </div>`;
          document.getElementById("cookie-banner-placeholder").innerHTML = bannerHTML;
          
          document.getElementById("accept-cookies").addEventListener("click", function () {
            localStorage.setItem("cookieAccepted", "true");
            document.getElementById("cookie-banner").remove();
            loadGoogleAnalytics();
          });
        });
      </script>
    

format:
  html:
    theme: custom.scss
    toc: true
    toc-depth: 3
    navigation:
      sidebar: false
    meta:
      description: "Personal website of Cecilia Baldoni"
      author: "Cecilia Baldoni"
      keywords: ["Cecilia Baldoni", "behavioral ecology", "neuroscience", "cognition", "science illustration", "science communication"]

editor: source
