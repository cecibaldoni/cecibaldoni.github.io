<script>
  document.addEventListener("DOMContentLoaded", () => {
    const palette = [
      "#6ea030", "#9dc840", "#c8dc78", "#c8ec98",  "#d4a820",  "#f5cc50", "#fae890", "#b05010", "#d47818", "#e89830", "#f0a030"
];
    document.querySelectorAll(".category").forEach(tag => {
      const color = palette[Math.floor(Math.random() * palette.length)];
      tag.style.backgroundColor = color;
    });
  });
</script>
